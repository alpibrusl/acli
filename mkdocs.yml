site_name: ACLI — Agent-friendly CLI
site_description: "ACLI is a specification and SDK for building CLI tools that AI agents can discover, learn, and use autonomously — without MCP servers or external schemas."
site_url: https://alpibrusl.github.io/acli
repo_url: https://github.com/alpibrusl/acli
repo_name: alpibrusl/acli
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - meta
  - toc:
      permalink: true

nav:
  - Home: index.md
  - "Example: Weather CLI": example.md
  - Specification:
      - Overview: spec/index.md
      - "Why ACLI? MCP → Skills → CLI": spec/evolution.md
      - Progressive Discovery: spec/discovery.md
      - Output Contracts: spec/output.md
      - Exit Codes: spec/exit-codes.md
      - Error Design: spec/errors.md
      - Dry-run & Idempotency: spec/dry-run.md
      - Compliance Checklist: spec/compliance.md
  - Python SDK:
      - Getting Started: python-sdk/index.md
      - ACLIApp: python-sdk/app.md
      - Commands: python-sdk/commands.md
      - Output & Envelopes: python-sdk/output.md
      - Errors: python-sdk/errors.md
      - Introspection: python-sdk/introspection.md
      - Skill Files & acli CLI: python-sdk/skill.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alpibrusl/acli
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/acli-spec/
